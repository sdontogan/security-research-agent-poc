name: sync live web adaptation

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-live-web-adaptation
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Mirror the live agent implementation
        env:
          WEBSITE_REPO_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: python scripts/sync_web_adaptation.py
      - name: Publish changes
        run: |
          if git diff --quiet -- web-adaptation; then
            echo "The web adaptation is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web-adaptation
          git commit -m "Sync live Beyond Features agent code"
          git push
